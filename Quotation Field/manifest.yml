modules:
  jira:customField:
    - key: quotation-field
      name: Quotation
      description: Quotation Reference
      type: string
      render: native
      resource: main
      edit:
        resource: edit
        render: native
        isInline: true
      resolver:
        function: resolver
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: src/frontend/index.jsx
  - key: edit
    path: src/frontend/edit.jsx

permissions:
  content:
    styles:
      - 'unsafe-inline'
  scopes:
    - storage:app
    - read:jira-work
    - write:jira-work
    - read:jira-user
app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/131cc9b2-babe-4052-b918-b778c9216689
