modules:
  jira:customField:
    - key: jqlfield-custom-field-ui-kit-2-hello-world
      name: Incident Classification
      description: Classify the incident by selecting Project, Type, and Activity.
      type: string
      render: native
      resource: main
      edit:
        resource: edit
        render: native
        isInline: true
      resolver:
        function: resolver
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: src/frontend/index.jsx
  - key: edit
    path: src/frontend/edit.jsx

permissions:
  content:
    styles:
      - 'unsafe-inline'
  scopes:
    - storage:app
    - read:jira-work
    - write:jira-work
    - read:jira-user
app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/d9980cd8-4158-4bff-81fd-ea0b590c13ce
